name: Build Redmi K50 DroidSpaces Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: rubens-s-oss
  DEFCONFIG: mikrn_rubens_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod zip unzip curl git python3 \
            device-tree-compiler gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf

      - name: Setup Clang toolchain
        run: |
          # 使用 AOSP 预编译的 clang (更可靠)
          CLANG_VERSION="r522817"
          wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${CLANG_VERSION}.tar.gz" -O clang.tar.gz || {
            echo "AOSP clang download failed, using system clang"
            sudo apt-get install -y clang lld
          }
          if [ -f clang.tar.gz ]; then
            mkdir -p clang && tar -xzf clang.tar.gz -C clang
            export PATH="$(pwd)/clang/bin:$PATH"
          fi
          clang --version | head -3
          echo "CC=clang" >> $GITHUB_ENV

      - name: Clone kernel source
        run: |
          echo "Cloning $KERNEL_REPO (branch: $KERNEL_BRANCH)..."
          git clone --depth=1 --branch "$KERNEL_BRANCH" "$KERNEL_REPO" kernel
          echo "=== Kernel top-level files ==="
          ls kernel/
          echo "=== Available defconfigs ==="
          ls kernel/arch/arm64/configs/ | head -30
          echo "=== Looking for rubens defconfig ==="
          ls kernel/arch/arm64/configs/ | grep -i rubens || echo "NOT FOUND - listing all MTK configs:"
          ls kernel/arch/arm64/configs/ | grep -i mtk || true
          echo "=== Check Makefile kernel version ==="
          head -5 kernel/Makefile

      - name: Find correct defconfig
        working-directory: kernel
        run: |
          echo "Searching for defconfig..."
          # Try multiple possible names
          for name in mikrn_rubens_defconfig rubens_defconfig rubens-s-oss_defconfig; do
            if [ -f "arch/arm64/configs/$name" ]; then
              echo "FOUND: $name"
              echo "DEFCONFIG_NAME=$name" >> $GITHUB_ENV
              break
            fi
          done

          # If not found, search more broadly
          if [ -z "$DEFCONFIG_NAME" ]; then
            echo "Exact name not found, searching..."
            FOUND=$(find arch/arm64/configs -name "*rubens*" -o -name "*k50*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "FOUND: $FOUND"
              echo "DEFCONFIG_NAME=$(basename $FOUND)" >> $GITHUB_ENV
            else
              echo "ERROR: No rubens defconfig found!"
              echo "All available defconfigs:"
              ls arch/arm64/configs/
              exit 1
            fi
          fi

      - name: Download DroidSpaces patches
        run: |
          mkdir -p kernel/patches
          cd kernel/patches

          echo "Downloading SYSVIPC kABI patch..."
          curl -sL "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch" \
            -o "001-fix_sysvipc_kabi.patch"

          echo "Downloading POSIX_MQUEUE patch..."
          curl -sL "https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch" \
            -o "002-fix_posix_mqueue.patch"

          echo "Patches downloaded:"
          ls -la
          echo "--- Patch 001 preview ---"
          head -20 001-fix_sysvipc_kabi.patch
          echo "--- Patch 002 preview ---"
          head -20 002-fix_posix_mqueue.patch

      - name: Apply DroidSpaces patches
        working-directory: kernel
        run: |
          echo "Applying DroidSpaces patches..."
          for patch in patches/*.patch; do
            echo "=== Applying: $(basename $patch) ==="
            patch -p1 --verbose < "$patch" || {
              echo "WARNING: Patch $(basename $patch) had issues (may already be applied)"
            }
          done
          echo "All patches processed."

      - name: Apply DroidSpaces kernel config
        working-directory: kernel
        run: |
          CONFIG_FILE="arch/arm64/configs/${DEFCONFIG_NAME}"
          echo "Config file: $CONFIG_FILE"
          echo "File exists: $(ls -la $CONFIG_FILE)"

          echo "" >> "$CONFIG_FILE"
          echo "# DroidSpaces container support (auto-added)" >> "$CONFIG_FILE"
          cat ../droidspaces.config >> "$CONFIG_FILE"

          # Fix interactive prompts - pre-set these options
          echo "" >> "$CONFIG_FILE"
          echo "# Prevent interactive prompts during build" >> "$CONFIG_FILE"
          echo "CONFIG_INIT_STACK_NONE=y" >> "$CONFIG_FILE"
          echo "# CONFIG_INIT_STACK_ALL_PATTERN is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_INIT_STACK_ALL_ZERO is not set" >> "$CONFIG_FILE"
          echo "CONFIG_INIT_ON_ALLOC_DEFAULT_ON=n" >> "$CONFIG_FILE"
          echo "CONFIG_INIT_ON_FREE_DEFAULT_ON=n" >> "$CONFIG_FILE"

          # Enable module support (required for some vendor modules)
          echo "" >> "$CONFIG_FILE"
          echo "# Enable loadable module support" >> "$CONFIG_FILE"
          echo "CONFIG_MODULES=y" >> "$CONFIG_FILE"
          echo "CONFIG_MODULE_UNLOAD=y" >> "$CONFIG_FILE"
          echo "CONFIG_MODULE_FORCE_UNLOAD=y" >> "$CONFIG_FILE"

          echo "=== DroidSpaces configs added ==="
          grep -E "^CONFIG_(SYSVIPC|POSIX_MQUEUE|IPC_NS|PID_NS|DEVTMPFS|NET_NS|CGROUPS|NAMESPACES|SECCOMP|OVERLAY_FS|VETH|BRIDGE|MODULES|INIT_STACK)" "$CONFIG_FILE"

      - name: Build kernel
        working-directory: kernel
        run: |
          echo "========================================="
          echo " Building kernel for Redmi K50 (rubens)"
          echo "========================================="

          # Generate .config
          echo "Step 1: Generate .config from defconfig..."
          make ARCH=arm64 ${DEFCONFIG_NAME} 2>&1 | tee ../defconfig.log

          echo ""
          echo "Step 2: Verify critical configs are enabled..."
          for cfg in SYSVIPC POSIX_MQUEUE IPC_NS PID_NS DEVTMPFS NET_NS CGROUPS NAMESPACES SECCOMP; do
            val=$(grep "CONFIG_${cfg}=" .config 2>/dev/null || echo "NOT SET")
            echo "  CONFIG_${cfg}: $val"
          done

          echo ""
          echo "Step 3: Compile kernel..."
          echo "Using $(nproc) cores"

          # Build - use 'yes ""' to handle any remaining interactive prompts
          yes "" | make ARCH=arm64 -j$(nproc) \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image modules 2>&1 | tee ../build.log

          BUILD_EXIT=$?
          echo "Build exit code: $BUILD_EXIT"

          # Check if Image exists
          if [ -f "arch/arm64/boot/Image" ]; then
            echo "SUCCESS: Kernel Image found!"
            ls -la arch/arm64/boot/Image
          else
            echo "FAILURE: Kernel Image not found!"
            echo "=== Last 200 lines of build log ==="
            tail -200 ../build.log
            exit 1
          fi

      - name: Package kernel
        if: success()
        run: |
          mkdir -p output/dtbs

          cp kernel/arch/arm64/boot/Image output/
          find kernel/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/dtbs/ \; 2>/dev/null || true
          cp kernel/arch/arm64/configs/${DEFCONFIG_NAME} output/droidspaces_defconfig
          cp kernel/.config output/kernel_defconfig

          cd output && zip -r ../droidspaces-k50-kernel.zip .
          echo "Package created!"
          ls -la ../droidspaces-k50-kernel.zip

      - name: Upload kernel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: droidspaces-k50-kernel
          path: |
            output/Image
            output/dtbs/
            output/droidspaces_defconfig
            output/kernel_defconfig
            droidspaces-k50-kernel.zip
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            defconfig.log
          retention-days: 7
