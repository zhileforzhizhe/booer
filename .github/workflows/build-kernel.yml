name: Build Redmi K50 DroidSpaces Kernel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: rubens-s-oss
  DEFCONFIG: mikrn_rubens_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod zip unzip curl git python3 \
            device-tree-compiler gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf

      - name: Setup Clang toolchain
        run: |
          sudo apt-get install -y clang lld llvm
          # Ubuntu lld package installs as ld.lld-14, create symlink
          sudo ln -sf /usr/bin/ld.lld-14 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/lld-14 /usr/bin/lld
          echo "=== Toolchain versions ==="
          clang --version | head -1
          ld.lld --version | head -1
          llvm-ar --version | head -1
          echo "=== Verify ld.lld is in PATH ==="
          which ld.lld
          ls -la /usr/bin/ld.lld*

      - name: Clone kernel source
        run: |
          echo "Cloning $KERNEL_REPO (branch: $KERNEL_BRANCH)..."
          git clone --depth=1 --branch "$KERNEL_BRANCH" "$KERNEL_REPO" kernel
          echo "=== Kernel top-level files ==="
          ls kernel/
          echo "=== Available defconfigs ==="
          ls kernel/arch/arm64/configs/ | head -30
          echo "=== Looking for rubens defconfig ==="
          ls kernel/arch/arm64/configs/ | grep -i rubens || echo "NOT FOUND - listing all MTK configs:"
          ls kernel/arch/arm64/configs/ | grep -i mtk || true
          echo "=== Check Makefile kernel version ==="
          head -5 kernel/Makefile

      - name: Find correct defconfig
        working-directory: kernel
        run: |
          echo "Searching for defconfig..."
          # Try multiple possible names
          for name in mikrn_rubens_defconfig rubens_defconfig rubens-s-oss_defconfig; do
            if [ -f "arch/arm64/configs/$name" ]; then
              echo "FOUND: $name"
              echo "DEFCONFIG_NAME=$name" >> $GITHUB_ENV
              break
            fi
          done

          # If not found, search more broadly
          if [ -z "$DEFCONFIG_NAME" ]; then
            echo "Exact name not found, searching..."
            FOUND=$(find arch/arm64/configs -name "*rubens*" -o -name "*k50*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "FOUND: $FOUND"
              echo "DEFCONFIG_NAME=$(basename $FOUND)" >> $GITHUB_ENV
            else
              echo "ERROR: No rubens defconfig found!"
              echo "All available defconfigs:"
              ls arch/arm64/configs/
              exit 1
            fi
          fi

      - name: Fix kABI compatibility
        working-directory: kernel
        run: |
          echo "=== Patching android_kabi.h to disable kABI checks ==="

          # Save original
          cp include/linux/android_kabi.h include/linux/android_kabi.h.orig

          # Replace the entire __ANDROID_KABI_CHECK_SIZE_ALIGN macro body
          # and _ANDROID_KABI_REPLACE macro to avoid static_assert failures
          python3 << 'PYEOF'
          import re

          with open('include/linux/android_kabi.h', 'r') as f:
              content = f.read()

          # Replace __ANDROID_KABI_CHECK_SIZE_ALIGN macro
          content = re.sub(
              r'#define __ANDROID_KABI_CHECK_SIZE_ALIGN\(_orig, _new\).*?(?=\n#define|\n\n)',
              '#define __ANDROID_KABI_CHECK_SIZE_ALIGN(_orig, _new) do { } while (0)\n',
              content,
              flags=re.DOTALL
          )

          # Replace _ANDROID_KABI_REPLACE macro to just use _new directly
          content = re.sub(
              r'#define _ANDROID_KABI_REPLACE\(_orig, _new\).*?(?=\n#define|\n#endif)',
              '#define _ANDROID_KABI_REPLACE(_orig, _new) _new\n',
              content,
              flags=re.DOTALL
          )

          with open('include/linux/android_kabi.h', 'w') as f:
              f.write(content)

          print("=== Patched android_kabi.h ===")
          PYEOF

          # Verify the fix
          echo "=== Checking patched file ==="
          grep -n "ANDROID_KABI_CHECK_SIZE_ALIGN\|_ANDROID_KABI_REPLACE" include/linux/android_kabi.h

      - name: Fix MediaTek driver issues for Clang
        working-directory: kernel
        run: |
          echo "=== Fixing Clang strict include path issues ==="

          # Fix all angled includes with relative paths across the tree
          find . -name '*.c' -o -name '*.h' | while read f; do
            if grep -q '#include <\.\./' "$f" 2>/dev/null; then
              sed -i 's|#include <\(\.\./[^>]*\)>|#include "\1"|g' "$f"
              echo "Fixed includes in: $f"
            fi
          done

          # Specific fix for rpmb-mtk.c - mtk_mmc_host undeclared
          # This is likely a missing header or forward declaration
          if [ -f drivers/char/rpmb/rpmb-mtk.c ]; then
            echo "Checking rpmb-mtk.c for mtk_mmc_host..."
            grep -n 'mtk_mmc_host' drivers/char/rpmb/rpmb-mtk.c | head -5
            # Add include for the header that defines mtk_mmc_host
            MMC_HEADER=$(find . -name '*.h' -exec grep -l 'struct mtk_mmc_host' {} \; 2>/dev/null | head -1)
            if [ -n "$MMC_HEADER" ]; then
              echo "Found mtk_mmc_host defined in: $MMC_HEADER"
              # Add the include at the top of the file
              sed -i "1i #include \"$MMC_HEADER\"" drivers/char/rpmb/rpmb-mtk.c
            else
              echo "WARNING: mtk_mmc_host struct not found in any header"
              # Try to find what header defines it
              grep -rn 'struct mtk_mmc_host' include/ drivers/ 2>/dev/null | head -5
            fi
          fi

          echo "=== Done fixing MediaTek drivers ==="

      - name: Apply DroidSpaces kernel config
        working-directory: kernel
        run: |
          CONFIG_FILE="arch/arm64/configs/${DEFCONFIG_NAME}"
          echo "Config file: $CONFIG_FILE"

          # First: remove any existing conflicting configs from defconfig
          sed -i '/^CONFIG_SYSVIPC/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_POSIX_MQUEUE/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_IPC_NS/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_PID_NS/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_NET_NS/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_NETFILTER_XT_MATCH_ADDRTYPE/d' "$CONFIG_FILE"
          sed -i '/^CONFIG_DEVTMPFS/d' "$CONFIG_FILE"
          sed -i '/^# CONFIG_SYSVIPC is not set/d' "$CONFIG_FILE"
          sed -i '/^# CONFIG_POSIX_MQUEUE is not set/d' "$CONFIG_FILE"
          sed -i '/^# CONFIG_IPC_NS is not set/d' "$CONFIG_FILE"
          sed -i '/^# CONFIG_PID_NS is not set/d' "$CONFIG_FILE"
          sed -i '/^# CONFIG_NET_NS is not set/d' "$CONFIG_FILE"

          # Append DroidSpaces config (after removing conflicts)
          echo "" >> "$CONFIG_FILE"
          echo "# ============================================" >> "$CONFIG_FILE"
          echo "# DroidSpaces container support" >> "$CONFIG_FILE"
          echo "# ============================================" >> "$CONFIG_FILE"

          # Core dependencies first
          echo "CONFIG_NET=y" >> "$CONFIG_FILE"
          echo "CONFIG_INET=y" >> "$CONFIG_FILE"
          echo "CONFIG_SYSVIPC=y" >> "$CONFIG_FILE"
          echo "CONFIG_POSIX_MQUEUE=y" >> "$CONFIG_FILE"

          # Namespaces
          echo "CONFIG_NAMESPACES=y" >> "$CONFIG_FILE"
          echo "CONFIG_UTS_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_IPC_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_PID_NS=y" >> "$CONFIG_FILE"
          echo "CONFIG_NET_NS=y" >> "$CONFIG_FILE"

          # Cgroups
          echo "CONFIG_CGROUPS=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_DEVICE=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_PIDS=y" >> "$CONFIG_FILE"
          echo "CONFIG_MEMCG=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_SCHED=y" >> "$CONFIG_FILE"
          echo "CONFIG_CGROUP_FREEZER=y" >> "$CONFIG_FILE"

          # Seccomp
          echo "CONFIG_SECCOMP=y" >> "$CONFIG_FILE"
          echo "CONFIG_SECCOMP_FILTER=y" >> "$CONFIG_FILE"

          # Device filesystem
          echo "CONFIG_DEVTMPFS=y" >> "$CONFIG_FILE"

          # Networking for NAT mode
          echo "CONFIG_NETFILTER=y" >> "$CONFIG_FILE"
          echo "CONFIG_VETH=y" >> "$CONFIG_FILE"
          echo "CONFIG_BRIDGE=y" >> "$CONFIG_FILE"
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> "$CONFIG_FILE"
          echo "CONFIG_IP_NF_TARGET_MASQUERADE=y" >> "$CONFIG_FILE"
          echo "CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y" >> "$CONFIG_FILE"

          # OverlayFS (volatile mode)
          echo "CONFIG_OVERLAY_FS=y" >> "$CONFIG_FILE"

          # Module support
          echo "CONFIG_MODULES=y" >> "$CONFIG_FILE"
          echo "CONFIG_MODULE_UNLOAD=y" >> "$CONFIG_FILE"

          # Prevent interactive prompts
          echo "CONFIG_INIT_STACK_NONE=y" >> "$CONFIG_FILE"
          echo "CONFIG_INIT_ON_ALLOC_DEFAULT_ON=n" >> "$CONFIG_FILE"
          echo "CONFIG_INIT_ON_FREE_DEFAULT_ON=n" >> "$CONFIG_FILE"
          echo "CONFIG_LTO_NONE=y" >> "$CONFIG_FILE"
          echo "# CONFIG_LTO_CLANG_FULL is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_LTO_CLANG_THIN is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_SHADOW_CALL_STACK is not set" >> "$CONFIG_FILE"
          echo "CONFIG_ARM64_PTR_AUTH=n" >> "$CONFIG_FILE"
          echo "# CONFIG_ARM64_PTR_AUTH_KERNEL is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_ARM64_MTE is not set" >> "$CONFIG_FILE"
          echo "# CONFIG_ARM64_BTI_KERNEL is not set" >> "$CONFIG_FILE"
          echo "CONFIG_JUMP_LABEL=n" >> "$CONFIG_FILE"
          echo "# CONFIG_KPROBES is not set" >> "$CONFIG_FILE"
          echo "CONFIG_COMPAT_32BIT_TIME=n" >> "$CONFIG_FILE"
          echo "# CONFIG_RELR is not set" >> "$CONFIG_FILE"
          echo "CONFIG_ARM64_TLB_RANGE=n" >> "$CONFIG_FILE"

          echo "=== Final DroidSpaces configs in defconfig ==="
          grep -E "^CONFIG_(SYSVIPC|POSIX_MQUEUE|IPC_NS|PID_NS|NET_NS|DEVTMPFS|CGROUPS|NAMESPACES|SECCOMP|NET=|MODULES|INIT_STACK)" "$CONFIG_FILE"

      - name: Build kernel
        working-directory: kernel
        run: |
          echo "========================================="
          echo " Building kernel for Redmi K50 (rubens)"
          echo "========================================="

          # Generate .config
          echo "Step 1: Generate .config from defconfig..."
          make ARCH=arm64 ${DEFCONFIG_NAME} 2>&1 | tee ../defconfig.log

          echo ""
          echo "Step 2: Verify critical configs are enabled..."
          for cfg in SYSVIPC POSIX_MQUEUE IPC_NS PID_NS DEVTMPFS NET_NS CGROUPS NAMESPACES SECCOMP; do
            val=$(grep "CONFIG_${cfg}=" .config 2>/dev/null || echo "NOT SET")
            echo "  CONFIG_${cfg}: $val"
          done

          echo ""
          echo "Step 3: Compile kernel..."
          echo "Using $(nproc) cores"

          # Build - write full output to log file, show tail on failure
          make ARCH=arm64 -j$(nproc) \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabihf- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image modules > ../build.log 2>&1 || {
            echo "=== BUILD FAILED ==="
            echo "=== Searching for errors in build log ==="
            grep -n -i "error:" ../build.log | tail -30
            echo ""
            echo "=== Last 100 lines of build log ==="
            tail -100 ../build.log
            exit 1
          }

          # Check if Image exists
          if [ -f "arch/arm64/boot/Image" ]; then
            echo "SUCCESS: Kernel Image found!"
            ls -la arch/arm64/boot/Image
          else
            echo "FAILURE: Kernel Image not found!"
            echo "=== Last 200 lines of build log ==="
            tail -200 ../build.log
            exit 1
          fi

      - name: Package kernel
        if: success()
        run: |
          mkdir -p output/dtbs

          cp kernel/arch/arm64/boot/Image output/
          find kernel/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/dtbs/ \; 2>/dev/null || true
          cp kernel/arch/arm64/configs/${DEFCONFIG_NAME} output/droidspaces_defconfig
          cp kernel/.config output/kernel_defconfig

          cd output && zip -r ../droidspaces-k50-kernel.zip .
          echo "Package created!"
          ls -la ../droidspaces-k50-kernel.zip

      - name: Upload kernel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: droidspaces-k50-kernel
          path: |
            output/Image
            output/dtbs/
            output/droidspaces_defconfig
            output/kernel_defconfig
            droidspaces-k50-kernel.zip
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            defconfig.log
          retention-days: 7
